version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    allow:
      - dependency-type: all
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns:
          - "*"
  - package-ecosystem: gitsubmodule
    directory: /
    allow:
      - dependency-type: all
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
      exclude:
        - themes/minimal
    groups:
      gitsubmodule:
        patterns:
          - "*"
